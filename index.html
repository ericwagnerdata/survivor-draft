<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survivor Draft Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --dark:#0D0D0D; --charcoal:#1A1A1A; --gold:#D4A017; --fire:#FF6B00;
    --light:#F0E6D3; --muted:#666;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--dark); color:var(--light); min-height:100vh;
    font-family:'Lato',sans-serif; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(255,107,0,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(212,160,23,0.05) 0%, transparent 55%);
  }
  h1 { font-family:'Cinzel Decorative',serif; color:var(--gold); font-size:clamp(22px,6vw,40px); letter-spacing:0.06em; }
  .sub { font-family:'Cinzel',serif; color:var(--muted); letter-spacing:0.2em; text-transform:uppercase; font-size:11px; margin-top:10px; }
  .note { color:var(--light); opacity:0.7; margin-top:28px; max-width:32ch; line-height:1.6; font-size:14px; }
</style>
</head>
<body>
  <h1>Survivor Draft Pool</h1>
  <p class="sub">Eric &middot; Kris &middot; Kelly</p>
  <p class="note">Season tracker is being built. Standings, teams, and the full cast are on the way.</p>
</body>
</html>
